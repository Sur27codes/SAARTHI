<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Background gradient -->
  <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#020c1b"/>
    <stop offset="60%" stop-color="#071428"/>
    <stop offset="100%" stop-color="#0a1f3c"/>
  </linearGradient>

  <!-- Title gradient -->
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="45%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#34d399"/>
  </linearGradient>

  <!-- Glow filter for title -->
  <filter id="titleGlow" x="-10%" y="-30%" width="120%" height="160%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Soft dot glow -->
  <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Dot grid pattern -->
  <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#1e3a5f" opacity="0.6"/>
  </pattern>

  <!-- Border gradient -->
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#34d399" stop-opacity="0.4"/>
  </linearGradient>
</defs>

<style>
  /* Title color cycle */
  @keyframes titleCycle {
    0%   { fill: #38bdf8; }
    33%  { fill: #a78bfa; }
    66%  { fill: #34d399; }
    100% { fill: #38bdf8; }
  }
  .title { animation: titleCycle 5s ease-in-out infinite; }

  /* Live indicator blink */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  .live-dot { animation: blink 1.4s ease-in-out infinite; }

  /* Dot pulse per zone */
  @keyframes dp { 0%,100% { opacity:.75; } 50% { opacity:1; } }
  .dp1 { animation: dp 2.2s 0.0s infinite; }
  .dp2 { animation: dp 2.2s 0.3s infinite; }
  .dp3 { animation: dp 2.2s 0.6s infinite; }
  .dp4 { animation: dp 2.2s 0.9s infinite; }
  .dp5 { animation: dp 2.2s 1.2s infinite; }
  .dp6 { animation: dp 2.2s 1.5s infinite; }
  .dp7 { animation: dp 2.2s 1.8s infinite; }
</style>

<!-- Background fill -->
<rect width="900" height="280" rx="14" fill="url(#bg)"/>
<!-- Dot grid overlay -->
<rect width="900" height="280" rx="14" fill="url(#grid)" opacity="0.5"/>
<!-- Border -->
<rect x="1" y="1" width="898" height="278" rx="13" fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

<!-- Left ambient glow -->
<ellipse cx="210" cy="140" rx="220" ry="130" fill="#3b82f6" opacity="0.03"/>
<!-- Right ambient glow -->
<ellipse cx="690" cy="140" rx="200" ry="120" fill="#8b5cf6" opacity="0.03"/>

<!-- ═══════════════ LEFT PANEL ═══════════════ -->

<!-- SAARTHI title -->
<text class="title" x="48" y="106"
  font-family="-apple-system, BlinkMacSystemFont, Arial Black, sans-serif"
  font-size="70" font-weight="900" fill="#38bdf8"
  filter="url(#titleGlow)">SAARTHI</text>

<!-- Subtitle -->
<text x="50" y="133"
  font-family="-apple-system, Arial, sans-serif"
  font-size="12.5" fill="#475569" letter-spacing="3.5">
  ENS CLINICAL INTELLIGENCE PLATFORM
</text>

<!-- Underline -->
<line x1="50" y1="142" x2="400" y2="142" stroke="#1e3a5f" stroke-width="0.8"/>

<!-- ── Badges row ── -->

<!-- HackRare badge -->
<rect x="50" y="154" width="144" height="26" rx="13" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
<text x="122" y="171" font-family="Arial, sans-serif" font-size="11.5" fill="#a5b4fc" text-anchor="middle">🏆 Built for HackRare</text>

<!-- Live badge -->
<rect x="204" y="154" width="72" height="26" rx="13" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
<circle class="live-dot" cx="218" cy="167" r="4" fill="#22c55e"/>
<text x="242" y="171" font-family="Arial, sans-serif" font-size="11.5" fill="#4ade80" text-anchor="middle">LIVE</text>

<!-- Next.js badge -->
<rect x="286" y="154" width="78" height="26" rx="13" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="325" y="171" font-family="Arial, sans-serif" font-size="11.5" fill="#94a3b8" text-anchor="middle">Next.js 16</text>

<!-- Flask badge -->
<rect x="374" y="154" width="62" height="26" rx="13" fill="#052e16" stroke="#166534" stroke-width="1"/>
<text x="405" y="171" font-family="Arial, sans-serif" font-size="11.5" fill="#86efac" text-anchor="middle">Flask 3</text>

<!-- ── ECG Line ── -->
<!-- Track -->
<line x1="50" y1="225" x2="415" y2="225" stroke="#0f2545" stroke-width="1.5"/>
<!-- ECG pulse path -->
<path d="M50,225 L105,225 L117,225 L126,194 L133,252 L139,212 L145,225 L195,225
         L207,225 L216,192 L224,255 L230,214 L236,225 L295,225
         L307,225 L316,196 L322,250 L328,213 L334,225 L415,225"
  stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.75"
  stroke-dasharray="700" stroke-dashoffset="700">
  <animate attributeName="stroke-dashoffset" values="700;0;0;700" dur="3.5s" repeatCount="indefinite"/>
</path>
<!-- Pulse dot -->
<circle cx="415" cy="225" r="3.5" fill="#3b82f6" opacity="0">
  <animate attributeName="opacity" values="0;0;1;0" dur="3.5s" repeatCount="indefinite"/>
</circle>

<!-- Bottom caption -->
<text x="50" y="256" font-family="Arial, sans-serif" font-size="11" fill="#1e3a5f" letter-spacing="1">
  saarthi-hackrare.vercel.app
</text>

<!-- ═══════════════ DIVIDER ═══════════════ -->
<line x1="448" y1="18" x2="448" y2="262" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4 4"/>

<!-- ═══════════════ RIGHT PANEL: 7 ENS ZONES ═══════════════ -->

<!-- Section header -->
<text x="672" y="32"
  font-family="-apple-system, Arial, sans-serif"
  font-size="10.5" font-weight="700" fill="#334155"
  text-anchor="middle" letter-spacing="3">7 ENS DIMENSIONS</text>

<!-- Severity label -->
<text x="862" y="32" font-family="Arial, sans-serif" font-size="9.5" fill="#1e3a5f" text-anchor="end" letter-spacing="1">SEVERITY</text>

<!-- Row layout: dot at x=470, label at x=484, bar track x=620 w=120, starts y=52 step=34 -->

<!-- 1. Anxiety  #6366f1 -->
<circle class="dp1" cx="470" cy="56" r="6" fill="#6366f1" filter="url(#dotGlow)"/>
<circle cx="470" cy="56" r="6" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="0.0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="0.0s" repeatCount="indefinite"/>
</circle>
<text x="484" y="60.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Anxiety</text>
<rect x="620" y="49" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="49" width="0" height="14" rx="7" fill="#6366f1" opacity="0.85">
  <animate attributeName="width" from="0" to="88" dur="1.4s" begin="0.2s" fill="freeze"/>
</rect>

<!-- 2. Sleep Quality  #64748b -->
<circle class="dp2" cx="470" cy="90" r="6" fill="#64748b" filter="url(#dotGlow)"/>
<circle cx="470" cy="90" r="6" fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
</circle>
<text x="484" y="94.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Sleep Quality</text>
<rect x="620" y="83" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="83" width="0" height="14" rx="7" fill="#64748b" opacity="0.85">
  <animate attributeName="width" from="0" to="70" dur="1.4s" begin="0.4s" fill="freeze"/>
</rect>

<!-- 3. Air Sensation  #3b82f6 -->
<circle class="dp3" cx="470" cy="124" r="6" fill="#3b82f6" filter="url(#dotGlow)"/>
<circle cx="470" cy="124" r="6" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
</circle>
<text x="484" y="128.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Air Sensation</text>
<rect x="620" y="117" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="117" width="0" height="14" rx="7" fill="#3b82f6" opacity="0.85">
  <animate attributeName="width" from="0" to="98" dur="1.4s" begin="0.6s" fill="freeze"/>
</rect>

<!-- 4. Nasal Dryness  #f97316 -->
<circle class="dp4" cx="470" cy="158" r="6" fill="#f97316" filter="url(#dotGlow)"/>
<circle cx="470" cy="158" r="6" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
</circle>
<text x="484" y="162.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Nasal Dryness</text>
<rect x="620" y="151" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="151" width="0" height="14" rx="7" fill="#f97316" opacity="0.85">
  <animate attributeName="width" from="0" to="60" dur="1.4s" begin="0.8s" fill="freeze"/>
</rect>

<!-- 5. Nasal Burning  #ef4444 -->
<circle class="dp5" cx="470" cy="192" r="6" fill="#ef4444" filter="url(#dotGlow)"/>
<circle cx="470" cy="192" r="6" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
</circle>
<text x="484" y="196.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Nasal Burning</text>
<rect x="620" y="185" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="185" width="0" height="14" rx="7" fill="#ef4444" opacity="0.85">
  <animate attributeName="width" from="0" to="76" dur="1.4s" begin="1.0s" fill="freeze"/>
</rect>

<!-- 6. Suffocation  #8b5cf6 -->
<circle class="dp6" cx="470" cy="226" r="6" fill="#8b5cf6" filter="url(#dotGlow)"/>
<circle cx="470" cy="226" r="6" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
</circle>
<text x="484" y="230.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Suffocation</text>
<rect x="620" y="219" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="219" width="0" height="14" rx="7" fill="#8b5cf6" opacity="0.85">
  <animate attributeName="width" from="0" to="92" dur="1.4s" begin="1.2s" fill="freeze"/>
</rect>

<!-- 7. Humidity Sens.  #0ea5e9 -->
<circle class="dp7" cx="470" cy="260" r="6" fill="#0ea5e9" filter="url(#dotGlow)"/>
<circle cx="470" cy="260" r="6" fill="none" stroke="#0ea5e9" stroke-width="1.2" opacity="0.6">
  <animate attributeName="r" from="6" to="16" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
</circle>
<text x="484" y="264.5" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1">Humidity Sens.</text>
<rect x="620" y="253" width="120" height="14" rx="7" fill="#0f172a"/>
<rect x="620" y="253" width="0" height="14" rx="7" fill="#0ea5e9" opacity="0.85">
  <animate attributeName="width" from="0" to="82" dur="1.4s" begin="1.4s" fill="freeze"/>
</rect>

</svg>
